@version: 4.0
@include "scl.conf"

options {
    chain_hostnames(off);
    use_dns(no);
    keep_hostname(yes);
    create_dirs(yes);
    stats(freq(60));
};

source s_local {
    internal();
    unix-stream("/dev/log");
};

source s_network {
    network(ip(0.0.0.0) port(514) transport("udp"));
    network(ip(0.0.0.0) port(514) transport("tcp"));
    network(ip(0.0.0.0) port(601) transport("tcp"));
};

destination d_consolidated {
    file(
        "/var/log/syslog-ng/remote/consolidated.log"
        template("$ISODATE ${HOST} ${PROGRAM}[${PID}]: ${MSG}\n")
        create-dirs(yes)
    );
};

destination d_per_host {
    file(
        "/var/log/syslog-ng/remote/${HOST}/${YEAR}-${MONTH}-${DAY}.log"
        template("$ISODATE ${FACILITY}.${LEVEL} ${PROGRAM}[${PID}]: ${MSG}\n")
        create-dirs(yes)
    );
};

log {
    source(s_local);
    destination(d_consolidated);
};

log {
    source(s_network);
    destination(d_consolidated);
    destination(d_per_host);
};
