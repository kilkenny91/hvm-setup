services:
  syslog-ng:
    image: balabit/syslog-ng:4.7.1
    container_name: ops-syslog-ng
    restart: unless-stopped
    ports:
      - "514:514/udp"
      - "514:514/tcp"
      - "601:601/tcp"
    volumes:
      - syslog-data:/var/log/syslog-ng
      - ./syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
    command: ["--no-caps", "--foreground", "-F", "/etc/syslog-ng/syslog-ng.conf"]

  loki:
    image: grafana/loki:2.9.4
    container_name: ops-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: ["-config.file=/etc/loki/local-config.yaml"]

  promtail:
    image: grafana/promtail:2.9.4
    container_name: ops-promtail
    restart: unless-stopped
    depends_on:
      - loki
      - syslog-ng
    volumes:
      - syslog-data:/var/log/syslog-ng:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: ["-config.file=/etc/promtail/config.yml"]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: ops-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://${OPS_VM_IP:-localhost}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ops-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - alertmanager-data:/alertmanager
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

volumes:
  syslog-data:
    name: ops-syslog-data
  loki-data:
    name: ops-loki-data
  prometheus-data:
    name: ops-prometheus-data
  grafana-data:
    name: ops-grafana-data
  alertmanager-data:
    name: ops-alertmanager-data
