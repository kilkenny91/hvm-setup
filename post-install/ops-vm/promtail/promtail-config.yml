server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: syslog-consolidated
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          source: consolidated
          __path__: /var/log/syslog-ng/remote/consolidated.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\S+)\s+(?P<host>\S+)\s+(?P<content>.*)$'
      - labels:
          host:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: syslog-per-host
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          source: per_host
          __path__: /var/log/syslog-ng/remote/*/*.log
    pipeline_stages:
      - regex:
          expression: '.*/remote/(?P<host>[^/]+)/.*'
      - labels:
          host:
